{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adarsh Srinivasan | Portfolio</title>
    <link rel="stylesheet" href="{% static 'main/styles.css' %}">
</head>
<body>
    <div class="background"></div>

    <nav class="navbar">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/about/" class="{% if request.path == '/about/' %}active{% endif %}">About</a>
        <a href="/projects/" class="{% if request.path == '/projects/' %}active{% endif %}">Projects</a>
        <a href="/contact/" class="{% if request.path == '/contact/' %}active{% endif %}">Contact</a>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem;">
        &copy; 2024 Adarsh Srinivasan. Built with Django.
    </footer>
</body>
</html>
